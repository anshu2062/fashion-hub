<style>
.cart-container{
    width:80%;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.checkout-btn{
    margin-top:20px;
    background:#00bfff;
    color:white;
    padding:12px 20px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:6px 12px;
    cursor:pointer;
}

<table>

<thead>

<tr>

<th>Product</th>

<th>Price</th>

<th>Action</th>

</tr>

</thead>

<tbody id="cart-items">

</tbody>

</table>
